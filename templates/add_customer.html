{% extends "base.html" %} {% block title %}Add Customer - Apparel Inventory
System{% endblock %} {% block header %}Add Customer{% endblock %} {% block
header_buttons %}
<a href="{{ url_for('customers') }}" class="btn btn-sm btn-secondary">
  <i class="fas fa-arrow-left me-1"></i> Back to Customers
</a>
{% endblock %} {% block content %}
<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('add_customer') }}">
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              required
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control" id="phone" name="phone" />
          </div>
          <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea
              class="form-control"
              id="address"
              name="address"
              rows="3"
            ></textarea>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Save Customer</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
