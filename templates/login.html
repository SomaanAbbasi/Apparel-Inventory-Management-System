{% extends "base.html" %} {% block title %}Login - Apparel Inventory System{%
endblock %} {% block auth_content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Admin Login</h4>
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              required
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Login</button>
          </div>
        </form>
        <div class="mt-3 text-center">
          <small class="text-muted"
            >Default admin credentials: admin / admin123</small
          >
        </div>
      </div>
    </div>

    <!-- Add this section -->
    <div class="card mt-4 shadow">
      <div class="card-body text-center">
        <h5>Are you a customer?</h5>
        <p>Visit our online store to browse products and place orders.</p>
        <a href="{{ url_for('shop') }}" class="btn btn-success">
          <i class="fas fa-shopping-cart me-2"></i>Go to Shop
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
