{% extends "base.html" %} {% block title %}Edit Customer - Apparel Inventory
System{% endblock %} {% block header %}Edit Customer{% endblock %} {% block
header_buttons %}
<a href="{{ url_for('customers') }}" class="btn btn-sm btn-secondary">
  <i class="fas fa-arrow-left me-1"></i> Back to Customers
</a>
{% endblock %} {% block content %}
<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form
          method="POST"
          action="{{ url_for('edit_customer', customer_id=customer.id) }}"
        >
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              value="{{ customer.name }}"
              required
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              value="{{ customer.email }}"
              required
            />
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input
              type="text"
              class="form-control"
              id="phone"
              name="phone"
              value="{{ customer.phone_no or '' }}"
            />
          </div>
          <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" name="address" rows="3">
{{ customer.address or '' }}</textarea
            >
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              Update Customer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
