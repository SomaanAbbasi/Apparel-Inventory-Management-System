{% extends "base.html" %} {% block title %}Add Employee - Apparel Inventory
System{% endblock %} {% block header %}Add Employee{% endblock %} {% block
header_buttons %}
<a href="{{ url_for('employees') }}" class="btn btn-sm btn-secondary">
  <i class="fas fa-arrow-left me-1"></i> Back to Employees
</a>
{% endblock %} {% block content %}
<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('add_employee') }}">
          <h5 class="mb-3">Employee Information</h5>
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              required
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control" id="phone" name="phone" />
          </div>
          <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select class="form-select" id="role" name="role" required>
              <option value="">Select Role</option>
              <option value="Manager">Manager</option>
              <option value="Sales Associate">Sales Associate</option>
              <option value="Inventory Clerk">Inventory Clerk</option>
              <option value="Cashier">Cashier</option>
              <option value="Administrator">Administrator</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="salary" class="form-label">Salary</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input
                type="number"
                class="form-control"
                id="salary"
                name="salary"
                step="0.01"
                min="0"
                required
              />
            </div>
          </div>

          <h5 class="mb-3 mt-4">System Account</h5>
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              required
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Save Employee</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
