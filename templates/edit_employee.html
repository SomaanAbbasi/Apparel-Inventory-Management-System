{% extends "base.html" %}

{% block title %}Edit Employee - Apparel Inventory System{% endblock %}

{% block header %}Edit Employee{% endblock %}

{% block header_buttons %}
<a href="{{ url_for('employees') }}" class="btn btn-sm btn-secondary">
    <i class="fas fa-arrow-left me-1"></i> Back to Employees
</a>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_employee', employee_id=employee.id) }}">
                    <h5 class="mb-3">Employee Information</h5>
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ employee.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ employee.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" name="phone" value="{{ employee.phone_no or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Role</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="">Select Role</option>
                            <option value="Manager" {% if employee.role == 'Manager' %}selected{% endif %}>Manager</option>
                            <option value="Sales Associate" {% if employee.role == 'Sales Associate' %}selected{% endif %}>Sales Associate</option>
                            <option value="Inventory Clerk" {% if employee.role == 'Inventory Clerk' %}selected{% endif %}>Inventory Clerk</option>
                            <option value="Cashier" {% if employee.role == 'Cashier' %}selected{% endif %}>Cashier</option>
                            <option value="Administrator" {% if employee.role == 'Administrator' %}selected{% endif %}>Administrator</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="salary" class="form-label">Salary</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" id="salary" name="salary" step="0.01" min="0" value="{{ employee.salary }}" required>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Update Employee</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
